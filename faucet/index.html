<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Obelyth Testnet Faucet</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --gold:     #C9A84C;
      --purple:   #9B59D0;
      --white:    #F0F4FF;
      --midnight: #06080F;
      --panel:    #0E1320;
      --border:   #1E2436;
      --err:      #FF6B7A;
      --ok:       #5BD68A;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--midnight);
      color: var(--white);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem;
    }
    h1 {
      font-size: 1.75rem;
      margin: 0 0 .25rem;
      letter-spacing: -.02em;
    }
    h1 .accent { color: var(--gold); }
    p.tagline {
      color: #9098A8;
      margin: 0 0 2.5rem;
      font-size: .95rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      width: 100%;
      max-width: 460px;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #9098A8;
      margin: .75rem 0 .35rem;
    }
    input {
      width: 100%;
      padding: .65rem .75rem;
      background: #060912;
      color: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .95rem;
      font-family: ui-monospace, "SF Mono", "Cascadia Code", monospace;
    }
    input:focus {
      outline: none;
      border-color: var(--gold);
    }
    button {
      width: 100%;
      padding: .8rem;
      margin-top: 1.25rem;
      background: var(--gold);
      color: var(--midnight);
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .12s;
    }
    button:hover:not(:disabled) { opacity: .9; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .result {
      margin-top: 1.25rem;
      padding: .85rem 1rem;
      border-radius: 6px;
      font-size: .9rem;
      line-height: 1.5;
      display: none;
    }
    .result.show { display: block; }
    .result.ok  { background: rgba(91, 214, 138, .08); border: 1px solid rgba(91, 214, 138, .3); color: var(--ok); }
    .result.err { background: rgba(255, 107, 122, .08); border: 1px solid rgba(255, 107, 122, .3); color: var(--err); }
    .result code {
      display: block;
      margin-top: .4rem;
      padding: .4rem .6rem;
      background: var(--midnight);
      border-radius: 4px;
      font-size: .8rem;
      word-break: break-all;
      color: var(--white);
    }
    .status {
      display: flex;
      justify-content: space-around;
      font-size: .85rem;
      color: #9098A8;
    }
    .status .num {
      display: block;
      color: var(--white);
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: .15rem;
    }
    .footer {
      margin-top: 2rem;
      font-size: .8rem;
      color: #555968;
      text-align: center;
    }
    .footer a { color: var(--gold); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1><span class="accent">◇</span> Obelyth Testnet Faucet</h1>
  <p class="tagline">1,500 testnet OBY per registered account, one claim per network.</p>

  <div class="card">
    <label for="api_key">API key</label>
    <input id="api_key" placeholder="oby_..." autocomplete="off">

    <label for="address">Obelyth address</label>
    <input id="address" placeholder="OBY..." autocomplete="off">

    <button id="claim_btn">Claim 1,500 OBY</button>

    <div id="result" class="result"></div>
  </div>

  <div class="card status">
    <div><span class="num" id="stat_reserve">—</span>reserve</div>
    <div><span class="num" id="stat_today">—</span>paid today</div>
    <div><span class="num" id="stat_total">—</span>claims total</div>
  </div>

  <div class="footer">
    Testnet OBY has no monetary value · Subject to change after legal review<br>
    Don't have an API key? Register at <a href="/">obelyth.io</a>
  </div>

<script>
  // The faucet endpoint lives on the same origin as this page when served
  // by the node. For local development you can override here.
  const API = '';

  const $ = (id) => document.getElementById(id);
  const result = $('result');
  const btn = $('claim_btn');

  async function refreshStatus() {
    try {
      const r = await fetch(API + '/faucet/status');
      if (!r.ok) return;
      const s = await r.json();
      $('stat_reserve').textContent = Math.round(s.reserve_oby).toLocaleString();
      $('stat_today').textContent   = Math.round(s.paid_today_oby).toLocaleString();
      $('stat_total').textContent   = s.total_claims.toLocaleString();
    } catch (e) { /* offline; leave dashes */ }
  }

  function showResult(ok, text, detail) {
    result.className = 'result show ' + (ok ? 'ok' : 'err');
    result.innerHTML = text + (detail ? '<code>' + detail + '</code>' : '');
  }

  btn.addEventListener('click', async () => {
    const api_key = $('api_key').value.trim();
    const address = $('address').value.trim();
    if (!address) { showResult(false, 'Enter an OBY address.'); return; }
    btn.disabled = true;
    btn.textContent = 'Sending…';
    try {
      const r = await fetch(API + '/faucet/claim', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key, address }),
      });
      const body = await r.json();
      if (r.ok) {
        showResult(true,
          `Sent ${body.amount_oby.toLocaleString()} OBY to your address. ` +
          `Confirmation usually takes 30 seconds. Tx hash:`,
          body.tx_hash);
      } else {
        const msg = body.error || 'unknown error';
        showResult(false, msg);
      }
    } catch (e) {
      showResult(false, 'Network error: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Claim 1,500 OBY';
      refreshStatus();
    }
  });

  refreshStatus();
  setInterval(refreshStatus, 15_000);
</script>
</body>
</html>
