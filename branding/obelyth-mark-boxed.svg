<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Obelyth Simple Mark</title>
  <desc id="desc">A simple gold and purple crypto-style symbol combining an obelisk, circular chain ring, and central diamond.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6D46A"/>
      <stop offset="0.48" stop-color="#B88A25"/>
      <stop offset="1" stop-color="#6E5218"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B96DFF"/>
      <stop offset="1" stop-color="#5B2AD1"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="#070A12"/>

  <!-- circular chain / coin ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#gold)" stroke-width="34"/>
  <path d="M360 150a148 148 0 0 1 42 104" fill="none" stroke="#F6D46A" stroke-width="18" stroke-linecap="round" opacity=".92"/>

  <!-- obelisk blade -->
  <path d="M256 58 288 168v176L256 454 224 344V168Z" fill="url(#gold)"/>
  <path d="M256 58v396l-32-110V168Z" fill="#7B5B1C" opacity=".72"/>
  <path d="M256 58v396l32-110V168Z" fill="#E5BB55" opacity=".9"/>
  <path d="M256 58 272 168H240Z" fill="#FFE083" opacity=".9"/>

  <!-- center diamond / compute core -->
  <path d="M256 174 326 256 256 338 186 256Z" fill="#1B102C"/>
  <path d="M256 194 306 256 256 318 206 256Z" fill="url(#purple)"/>
  <path d="M256 224 282 256 256 288 230 256Z" fill="#D8B3FF" opacity=".95"/>
  <circle cx="256" cy="256" r="10" fill="#FFFFFF"/>
</svg>
